<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf9f6">
<title>Review Your Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text-muted: #888780;
    --text-hint: #b4b2a9;
    --accent: #1D9E75;
    --accent-light: #e1f5ee;
    --amber: #BA7517;
    --radius: 14px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --text: #f0ede8;
      --text-muted: #888780;
      --text-hint: #5f5e5a;
      --accent: #5dcaa5;
      --accent-light: #04342c;
      --amber: #ef9f27;
    }
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ── NAV ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--text);
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .history-btn, .streak-pill {
    border: 0.5px solid var(--border);
    background: var(--surface);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .streak-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--amber);
    border-color: var(--border);
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ── WRITE SCREEN ── */
  .write-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 120px;
    -webkit-overflow-scrolling: touch;
  }

  .day-label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--text-hint);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 28px;
    line-height: 1.15;
  }

  .section { margin-bottom: 24px; }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }

  /* Mood */
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .mood-btn {
    border: 0.5px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 10px 4px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .mood-btn.selected {
    border-color: var(--border-strong);
    background: var(--accent-light);
  }

  .mood-emoji { font-size: 20px; line-height: 1; }

  .mood-word {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    text-align: center;
    line-height: 1.2;
  }

  .mood-btn.selected .mood-word { color: var(--accent); font-weight: 500; }

  /* Stars */
  .star-row { display: flex; gap: 4px; }

  .star-btn {
    width: 40px; height: 40px;
    border: none;
    background: transparent;
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
    padding: 0;
    line-height: 1;
    color: var(--text-hint);
  }

  .star-btn.lit { color: var(--amber); }
  .star-btn:active { transform: scale(1.2); }

  /* Energy */
  .energy-wrap { display: flex; align-items: center; gap: 10px; }

  .energy-wrap input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .energy-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--surface);
    border: 2px solid var(--border-strong);
    border-radius: 50%;
    cursor: pointer;
  }

  .energy-num {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    min-width: 26px;
    text-align: center;
  }

  .energy-hint { font-size: 11px; color: var(--text-hint); min-width: 26px; }
  .energy-hint:last-child { text-align: right; }

  /* Wins */
  .win-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .win-row:first-child { border-top: 0.5px solid var(--border); }

  .win-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border-strong);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .win-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    padding: 0;
    -webkit-appearance: none;
  }

  .win-input:focus { outline: none; }
  .win-input::placeholder { color: var(--text-hint); font-style: italic; }
  .win-input:focus ~ .win-dot,
  .win-input:not(:placeholder-shown) ~ .win-dot { background: var(--accent); }

  /* Textarea */
  .entry-box {
    width: 100%;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    resize: none;
    line-height: 1.6;
    -webkit-appearance: none;
  }

  .entry-box:focus { outline: none; border-color: var(--border-strong); }
  .entry-box::placeholder { color: var(--text-hint); font-style: italic; }

  /* Tags */
  .tags-wrap { display: flex; gap: 6px; flex-wrap: wrap; }

  .tag {
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: var(--surface);
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .tag.active {
    background: var(--accent-light);
    border-color: var(--border-strong);
    color: var(--accent);
    font-weight: 500;
  }

  /* Tomorrow */
  .tomorrow-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .tmrw-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--text-hint);
    line-height: 1.4;
    flex-shrink: 0;
  }

  .tmrw-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    resize: none;
    -webkit-appearance: none;
    min-height: 48px;
  }

  .tmrw-input:focus { outline: none; }
  .tmrw-input::placeholder { color: var(--text-hint); font-style: italic; }

  /* ── FIXED FOOTER ── */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 20px max(16px, env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 30%);
    display: flex;
    justify-content: center;
  }

  .save-btn {
    width: 100%;
    max-width: 380px;
    border: none;
    background: var(--text);
    color: var(--bg);
    border-radius: 100px;
    padding: 15px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s, transform 0.1s;
  }

  .save-btn:active { opacity: 0.8; transform: scale(0.98); }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 8px 0 24px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(30px);
    background: var(--text);
    color: var(--bg);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── HISTORY SCREEN ── */
  .hist-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 40px;
    -webkit-overflow-scrolling: touch;
  }

  .hist-back {
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 16px 20px 0;
    -webkit-tap-highlight-color: transparent;
  }

  .hist-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    padding: 12px 20px 4px;
  }

  .hist-empty {
    text-align: center;
    color: var(--text-hint);
    font-style: italic;
    font-size: 14px;
    padding: 60px 20px;
  }

  .hist-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .hist-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .hist-date {
    font-size: 12px;
    color: var(--text-hint);
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }

  .hist-stars { font-size: 12px; color: var(--amber); letter-spacing: 1px; }

  .hist-mood {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .hist-reflection {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .hist-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .hist-tag {
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">reflect.</div>
  <div class="nav-right">
    <div class="streak-pill" id="streak-pill">★ <span id="streak-count">0</span> days</div>
    <button class="history-btn" onclick="showScreen('history')">History</button>
  </div>
</nav>

<!-- WRITE SCREEN -->
<div class="screen active" id="screen-write">
  <div class="write-scroll">
    <div class="day-label" id="date-label"></div>
    <div class="day-title">How was your day?</div>

    <div class="section">
      <div class="section-label">Feeling</div>
      <div class="mood-grid">
        <button class="mood-btn" data-mood="Excellent" onclick="selectMood(this)">
          <span class="mood-emoji">✨</span><span class="mood-word">Excel­lent</span>
        </button>
        <button class="mood-btn" data-mood="Good" onclick="selectMood(this)">
          <span class="mood-emoji">😊</span><span class="mood-word">Good</span>
        </button>
        <button class="mood-btn" data-mood="Okay" onclick="selectMood(this)">
          <span class="mood-emoji">😐</span><span class="mood-word">Okay</span>
        </button>
        <button class="mood-btn" data-mood="Rough" onclick="selectMood(this)">
          <span class="mood-emoji">😔</span><span class="mood-word">Rough</span>
        </button>
        <button class="mood-btn" data-mood="Difficult" onclick="selectMood(this)">
          <span class="mood-emoji">😞</span><span class="mood-word">Diffi­cult</span>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Rate your day</div>
      <div class="star-row" id="star-row">
        <button class="star-btn" onclick="setRating(1)">☆</button>
        <button class="star-btn" onclick="setRating(2)">☆</button>
        <button class="star-btn" onclick="setRating(3)">☆</button>
        <button class="star-btn" onclick="setRating(4)">☆</button>
        <button class="star-btn" onclick="setRating(5)">☆</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Energy level</div>
      <div class="energy-wrap">
        <span class="energy-hint">Low</span>
        <input type="range" min="1" max="10" step="1" value="5" id="energy-slider" oninput="updateEnergy(this.value)">
        <span class="energy-num" id="energy-num">5</span>
        <span class="energy-hint">High</span>
      </div>
    </div>

    <hr class="divider">

    <div class="section">
      <div class="section-label">Wins & highlights</div>
      <div>
        <div class="win-row">
          <input class="win-input" type="text" placeholder="Something that went well…" id="win1">
          <div class="win-dot"></div>
        </div>
        <div class="win-row">
          <input class="win-input" type="text" placeholder="A moment you're proud of…" id="win2">
          <div class="win-dot"></div>
        </div>
        <div class="win-row">
          <input class="win-input" type="text" placeholder="One thing you're grateful for…" id="win3">
          <div class="win-dot"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Reflection</div>
      <textarea class="entry-box" rows="5" id="reflection" placeholder="What's on your mind? What would you do differently?"></textarea>
    </div>

    <div class="section">
      <div class="section-label">Themes</div>
      <div class="tags-wrap">
        <span class="tag" onclick="toggleTag(this)">Work</span>
        <span class="tag" onclick="toggleTag(this)">Health</span>
        <span class="tag" onclick="toggleTag(this)">Relationships</span>
        <span class="tag" onclick="toggleTag(this)">Learning</span>
        <span class="tag" onclick="toggleTag(this)">Creative</span>
        <span class="tag" onclick="toggleTag(this)">Rest</span>
        <span class="tag" onclick="toggleTag(this)">Exercise</span>
        <span class="tag" onclick="toggleTag(this)">Family</span>
      </div>
    </div>

    <hr class="divider">

    <div class="section">
      <div class="section-label">Tomorrow's priority</div>
      <div class="tomorrow-card">
        <div class="tmrw-num">1</div>
        <textarea class="tmrw-input" id="tomorrow" placeholder="What's the one thing that matters most tomorrow?" rows="2"></textarea>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="save-btn" onclick="saveEntry()">Save reflection</button>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div class="screen" id="screen-history">
  <button class="hist-back" onclick="showScreen('write')">← Back</button>
  <div class="hist-title">Past reflections</div>
  <div class="hist-scroll" id="hist-list"></div>
</div>

<div class="toast" id="toast">Reflection saved — rest well.</div>

<script>
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let selectedMood = null;
  let rating = 0;

  function init() {
    const now = new Date();
    document.getElementById('date-label').textContent = DAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
    updateStreak();
  }

  function selectMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  }

  function setRating(n) {
    rating = n;
    const stars = document.querySelectorAll('.star-btn');
    stars.forEach((s, i) => {
      s.textContent = i < n ? '★' : '☆';
      s.classList.toggle('lit', i < n);
    });
  }

  function updateEnergy(v) {
    document.getElementById('energy-num').textContent = Math.round(v);
  }

  function toggleTag(el) { el.classList.toggle('active'); }

  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    if (name === 'history') renderHistory();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function getEntries() {
    try { return JSON.parse(localStorage.getItem('ryd_entries') || '[]'); } catch { return []; }
  }

  function saveEntries(arr) {
    localStorage.setItem('ryd_entries', JSON.stringify(arr));
  }

  function todayKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function updateStreak() {
    const entries = getEntries();
    const keys = new Set(entries.map(e => e.date));
    let streak = 0;
    const d = new Date();
    while (true) {
      const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (keys.has(k)) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }
    document.getElementById('streak-count').textContent = streak;
  }

  function saveEntry() {
    const entry = {
      date: todayKey(),
      ts: Date.now(),
      mood: selectedMood,
      rating,
      energy: parseInt(document.getElementById('energy-slider').value),
      wins: [
        document.getElementById('win1').value.trim(),
        document.getElementById('win2').value.trim(),
        document.getElementById('win3').value.trim()
      ].filter(Boolean),
      reflection: document.getElementById('reflection').value.trim(),
      tags: [...document.querySelectorAll('.tag.active')].map(t => t.textContent),
      tomorrow: document.getElementById('tomorrow').value.trim()
    };

    const entries = getEntries().filter(e => e.date !== entry.date);
    entries.unshift(entry);
    saveEntries(entries);
    updateStreak();
    showToast('Reflection saved — rest well.');
  }

  function renderHistory() {
    const list = document.getElementById('hist-list');
    const entries = getEntries();
    if (!entries.length) {
      list.innerHTML = '<div class="hist-empty">No reflections yet.<br>Your first entry will appear here.</div>';
      return;
    }
    list.innerHTML = entries.map(e => {
      const d = new Date(e.ts || e.date);
      const dateStr = DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
      const stars = '★'.repeat(e.rating || 0) + '☆'.repeat(5 - (e.rating || 0));
      const tags = (e.tags || []).map(t => `<span class="hist-tag">${t}</span>`).join('');
      return `
        <div class="hist-card">
          <div class="hist-card-top">
            <div class="hist-date">${dateStr}</div>
            <div class="hist-stars">${stars}</div>
          </div>
          ${e.mood ? `<div class="hist-mood">${e.mood} · energy ${e.energy || '—'}/10</div>` : ''}
          ${e.reflection ? `<div class="hist-reflection">${e.reflection}</div>` : ''}
          ${tags ? `<div class="hist-tags">${tags}</div>` : ''}
        </div>`;
    }).join('');
  }

  init();
</script>
</body>
</html>
