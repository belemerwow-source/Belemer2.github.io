<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Reflectie Dagboek</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-800 tracking-tight">✨ Dag Reflectie</h1>
            <p class="text-slate-500 mt-2">Bouw aan een bewuste mindset, dag na dag.</p>
        </header>

        <!-- Input Form -->
        <div class="glass p-6 rounded-2xl shadow-xl border border-white mb-8 card-gradient">
            <form id="reflectionForm" class="space-y-5">
                
                <!-- Mood Section -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Hoe is je stemming?</label>
                    <div class="grid grid-cols-3 gap-2">
                        <select id="mood" class="w-full p-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-400 outline-none bg-white">
                            <option value="😊 Gelukkig">😊 Gelukkig</option>
                            <option value="😐 Neutraal">😐 Neutraal</option>
                            <option value="😔 Somber">😔 Somber</option>
                            <option value="😴 Moe">😴 Moe</option>
                            <option value="🔥 Productief">🔥 Productief</option>
                            <option value="🧘 Rustig">🧘 Rustig</option>
                        </select>
                    </div>
                </div>

                <!-- Gratitude Section -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Waar ben je vandaag dankbaar voor?</label>
                    <textarea id="gratitude" rows="2" required
                        class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-400 outline-none transition-all"
                        placeholder="Bijv: Een goede kop koffie, een vriendelijke collega..."></textarea>
                </div>

                <!-- Reflection Section -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Reflectie van de dag</label>
                    <textarea id="content" rows="4" required
                        class="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-400 outline-none transition-all"
                        placeholder="Wat heb je geleerd? Wat ging er goed of minder goed?"></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl transition-all transform hover:scale-[1.01] active:scale-95">
                    Opslaan in dagboek
                </button>
            </form>
        </div>

        <!-- History Section -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-xl font-bold text-slate-800">Je geschiedenis</h2>
                <div class="flex gap-3">
                    <button onclick="exportToTxt()" class="text-xs font-medium text-blue-600 hover:text-blue-800">Download (.txt)</button>
                    <button onclick="clearAll()" class="text-xs font-medium text-red-500 hover:text-red-700">Alles wissen</button>
                </div>
            </div>
            
            <div id="entriesContainer" class="space-y-4">
                <!-- Hier komen de entries via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('reflectionForm');
        const entriesContainer = document.getElementById('entriesContainer');
        const moodInput = document.getElementById('mood');
        const gratitudeInput = document.getElementById('gratitude');
        const contentInput = document.getElementById('content');

        // Laad data bij start
        document.addEventListener('DOMContentLoaded', displayEntries);

        // Formulier Submit
        form.addEventListener('submit', (e)
        {
            e.preventDefault();

            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString('nl-NL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
                mood: moodInput.value,
                gratitude: gratitudeInput.value,
                content: contentInput.value
            };

            saveEntry(entry);
            form.reset();
            displayEntries();
        });

        // Opslaan in LocalStorage
        function saveEntry(entry) {
            const entries = getEntries();
            entries.unshift(entry); 
            localStorage.setItem('reflections', JSON.stringify(entries));
        }

        // Ophalen uit LocalStorage
        function getEntries() {
            const entries = localStorage.getItem('reflections');
            return entries ? JSON.parse(entries) : [];
        }

        // Weergeven op scherm
        function displayEntries() {
            const entries = getEntries();
            entriesContainer.innerHTML = '';

            if (entries.length === 0) {
                entriesContainer.innerHTML = '<div class="text-center py-10 text-slate-400 italic">Je dagboek is nog leeg. Begin met schrijven!</div>';
                return;
            }

            entries.forEach(entry => {
                const div = document.createElement('div');
                div: div.className = 'glass p-6 rounded-2xl border border-white shadow-sm card-gradient animate-fade-in';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">${entry.date}</span>
                            <div class="text-xl mt-1">${entry.mood}</div>
                        </div>
                        <button onclick="deleteEntry(${entry.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                    
                    <div class="mb-4">
                        <p class="text-xs font-semibold text-emerald-600 uppercase mb-1">Dankbaarheid</p>
                        <p class="text-slate-700 italic">"${entry.gratitude}"</p>
                    </div>

                    <div>
                        <p class="text-xs font-semibold text-slate-500 uppercase mb-1">Reflectie</p>
                        <p class="text-slate-800 whitespace-pre-wrap leading-relaxed">${entry.content}</p>
                    </div>
                `;
                entriesContainer.appendChild(div);
            });
        }

        // Verwijder één item
        function deleteEntry(id) {
            if(confirm("Verwijder deze reflectie?")) {
                let entries = getEntries();
                entries = entries.filter(entry => entry.id !== id);
                localStorage.setItem('reflections', JSON.stringify(entries));
                displayEntries();
            }
        }

        // Alles wissen
        function clearAll() {
            if(confirm("Weet je zeker dat je je hele dagboek wilt wissen? Dit kan niet ongedaan worden gemaakt!")) {
                localStorage.removeItem('reflections');
                displayEntries();
            }
        }

        // EXPORT FUNCTIE: Download als .txt bestand
        function exportToTxt() {
            const entries = getEntries();
            if (entries.length === 0) {
                alert("Geen data om te exporteren!");
                return;
            }

            let textContent = "MIJN DAG REFLECTIE - EXPORT\n";
            textContent += "==============================\n\n";

            entries.forEach(entry => {
                textContent += `DATUM: ${entry.date}\n`;
                textContent += `STEMMING: ${entry.mood}\n`;
                textContent += `DANKBAARHEID: ${entry.gratitude}\n`;
                textContent += `REFLECTIE: ${entry.content}\n`;
                textContent += `------------------------------\n\n`;
            });

            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `reflectie_dagboek_${new Date().toLocaleDateString()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
